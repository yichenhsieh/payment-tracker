<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請款審核 - 管理後台</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto py-8 px-4">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800">會計出納審核後台</h1>
      <button onclick="loadAdminData()" class="bg-gray-200 text-gray-700 px-3 py-1 rounded hover:bg-gray-300 text-sm">
        🔄 重新整理
      </button>
    </div>

    <div class="bg-white rounded-lg shadow overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-3 py-3 text-left font-medium text-gray-500">時間 / 申請人</th>
              <th class="px-3 py-3 text-left font-medium text-gray-500">項目 / 憑證類別</th>
              <th class="px-3 py-3 text-right font-medium text-gray-500">請款金額</th>
              <th class="px-3 py-3 text-center font-medium text-gray-500">發票已收到</th>
              <th class="px-3 py-3 text-left font-medium text-gray-500">會計科目設定</th>
              <th class="px-3 py-3 text-center font-medium text-gray-500">流程狀態</th>
              <th class="px-3 py-3 text-center font-medium text-gray-500">操作動作</th>
            </tr>
          </thead>
          <tbody id="adminTableBody" class="divide-y divide-gray-200 bg-white">
            <tr><td colspan="7" class="text-center py-6 text-gray-500">資料讀取中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://yqyjngpsgdewanppclep.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxeWpuZ3BzZ2Rld2FucHBjbGVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDIwODgsImV4cCI6MjA5ODg3ODA4OH0.CRigzLH0Qr8n-gpuJ_6v42BRM1SEXFPKX87GnPSM9BE';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.addEventListener('DOMContentLoaded', loadAdminData);

    async function loadAdminData() {
      const tbody = document.getElementById('adminTableBody');
      try {
        const { data, error } = await supabaseClient
          .from('receipts')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center py-6 text-gray-500">目前沒有需要處理的請款單</td></tr>';
          return;
        }

        tbody.innerHTML = data.map(item => `
          <tr class="hover:bg-gray-50">
            <td class="px-3 py-3">
              <div class="font-medium text-gray-900">${item.applicant_name}</div>
              <div class="text-xs text-gray-500">領款者: ${item.payee_name}</div>
              <div class="text-xs text-gray-400">${new Date(item.created_at).toLocaleDateString()}</div>
            </td>
            <td class="px-3 py-3">
              <div class="text-gray-900 truncate max-w-xs">${item.description}</div>
              <div class="text-xs text-gray-500">發票: ${item.invoice_number || '無'} (${item.receipt_type})</div>
              ${item.file_url ? `<a href="${item.file_url}" target="_blank" class="text-xs text-blue-600 hover:underline">查看附件</a>` : ''}
            </td>
            <td class="px-3 py-3 text-right font-semibold text-gray-900">
              $${item.claim_amount}
            </td>
            <td class="px-3 py-3 text-center">
              <input type="checkbox" ${item.is_receipt_received ? 'checked' : ''} 
                onchange="toggleReceiptReceived('${item.id}', this.checked)"
                class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
            </td>
            <td class="px-3 py-3">
              <select onchange="updateSubject('${item.id}', this.value)" class="border rounded text-xs p-1 border-gray-300">
                <option value="">-- 請選擇 --</option>
                <option value="差旅費" ${item.accounting_subject === '差旅費' ? 'selected' : ''}>差旅費</option>
                <option value="文具用品" ${item.accounting_subject === '文具用品' ? 'selected' : ''}>文具用品</option>
                <option value="雜項購置" ${item.accounting_subject === '雜項購置' ? 'selected' : ''}>雜項購置</option>
                <option value="餐費" ${item.accounting_subject === '餐費' ? 'selected' : ''}>餐費</option>
                <option value="活動費" ${item.accounting_subject === '活動費' ? 'selected' : ''}>活動費</option>
              </select>
            </td>
            <td class="px-3 py-3 text-center">
              ${getStatusBadge(item)}
            </td>
            <td class="px-3 py-3 text-center space-x-1">
              ${renderActionButtons(item)}
            </td>
          </tr>
        `).join('');

      } catch (err) {
        console.error('後台讀取失敗：', err);
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-6 text-red-500">資料讀取失敗：${err.message}</td></tr>`;
      }
    }

    function getStatusBadge(item) {
      if (item.status === 'paid') {
        if (item.is_payee_confirmed) {
          return '<span class="bg-purple-100 text-purple-800 text-xs px-2 py-1 rounded">🎉 雙方已結案</span>';
        } else {
          return '<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded">已撥款 (待確認)</span>';
        }
      }
      
      const map = {
        'pending_audit': '<span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded">待審核</span>',
        'pending_payment': '<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">待撥款</span>',
        'rejected': '<span class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded">已退單</span>'
      };
      return map[item.status] || item.status;
    }

    function renderActionButtons(item) {
      if (item.status === 'pending_audit') {
        return `
          <button onclick="approveAudit('${item.id}')" class="bg-green-600 text-white text-xs px-2 py-1 rounded hover:bg-green-700">會計審核通過</button>
          <button onclick="rejectClaim('${item.id}')" class="bg-red-600 text-white text-xs px-2 py-1 rounded hover:bg-red-700">退單</button>
        `;
      } else if (item.status === 'pending_payment') {
        return `
          <button onclick="confirmPayment('${item.id}')" class="bg-blue-600 text-white text-xs px-2 py-1 rounded hover:bg-blue-700">出納確認撥款</button>
        `;
      } else {
        return `<span class="text-xs text-gray-400">流程結束</span>`;
      }
    }

    async function toggleReceiptReceived(id, isChecked) {
      const { error } = await supabaseClient.from('receipts').update({ is_receipt_received: isChecked }).eq('id', id);
      if (error) alert(`更新發票收到狀態失敗: ${error.message}`);
    }

    async function updateSubject(id, subject) {
      const { error } = await supabaseClient.from('receipts').update({ accounting_subject: subject }).eq('id', id);
      if (error) alert(`更新科目失敗: ${error.message}`);
    }

    async function approveAudit(id) {
      const { error } = await supabaseClient.from('receipts').update({ 
        status: 'pending_payment',
        audited_at: new Date().toISOString()
      }).eq('id', id);

      if (error) alert(`操作失敗: ${error.message}`);
      else loadAdminData();
    }

    async function confirmPayment(id) {
      const { error } = await supabaseClient.from('receipts').update({ 
        status: 'paid',
        paid_at: new Date().toISOString()
      }).eq('id', id);

      if (error) alert(`操作失敗: ${error.message}`);
      else loadAdminData();
    }

    async function rejectClaim(id) {
      const reason = prompt('請輸入退單原因：');
      if (reason === null) return;

      const { error } = await supabaseClient.from('receipts').update({ 
        status: 'rejected',
        reject_reason: reason
      }).eq('id', id);

      if (error) alert(`操作失敗: ${error.message}`);
      else loadAdminData();
    }
  </script>
</body>
</html>
