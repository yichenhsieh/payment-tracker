<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>請款系統 - 前台</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto py-8 px-4">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">團隊請款與憑證報銷系統</h1>

    <!-- 頁籤導覽列 (固定區塊，不會因渲染失敗消失) -->
    <div class="flex border-b border-gray-200 mb-6 bg-white rounded-t-lg shadow-sm">
      <button id="tab-apply-btn" onclick="switchTab('apply')" class="flex-1 py-3 px-4 text-center font-medium text-blue-600 border-b-2 border-blue-600 focus:outline-none">
        填寫請款單
      </button>
      <button id="tab-history-btn" onclick="switchTab('history')" class="flex-1 py-3 px-4 text-center font-medium text-gray-500 hover:text-blue-600 focus:outline-none">
        查詢請款紀錄
      </button>
    </div>

    <!-- 頁籤 1: 填寫請款單 -->
    <div id="tab-apply" class="bg-white p-6 rounded-b-lg shadow-sm">
      <form id="receiptForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">團隊申請人 *</label>
            <input type="text" id="applicant_name" required class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">付款人全名 (出納將付款給此人) *</label>
            <input type="text" id="payee_name" required class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">電子郵件地址 *</label>
            <input type="email" id="email" required class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">採買日期 (發票日期) *</label>
            <input type="date" id="purchase_date" required class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">品名與項目說明 (含購買數量等) *</label>
          <textarea id="description" rows="3" required class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">發票總金額 ($) *</label>
            <input type="number" id="invoice_amount" step="any" required class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">請款總金額 ($) *</label>
            <input type="number" id="claim_amount" step="any" required class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">憑證種類 *</label>
            <select id="receipt_type" required class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300">
              <option value="電子發票">電子發票</option>
              <option value="紙本發票">紙本發票</option>
              <option value="收據">收據</option>
              <option value="勞務報酬單">勞務報酬單</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">發票編號 (如: ZD04655933，若無請填無)</label>
            <input type="text" id="invoice_number" placeholder="若無請填無" class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">上傳發票照片/憑證檔案連結</label>
          <input type="url" id="file_url" placeholder="https://..." class="w-full border rounded p-2 focus:ring-2 focus:ring-blue-500 border-gray-300">
        </div>

        <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded hover:bg-blue-700 transition">
          送出請款申請
        </button>
      </form>
    </div>

    <!-- 頁籤 2: 查詢請款紀錄 -->
    <div id="tab-history" class="bg-white p-6 rounded-b-lg shadow-sm hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">申請日期</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">申請人 / 付款人</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">項目說明</th>
              <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">請款金額</th>
              <th class="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">請款狀態</th>
            </tr>
          </thead>
          <tbody id="historyTableBody" class="bg-white divide-y divide-gray-200 text-sm">
            <tr><td colspan="5" class="text-center py-4 text-gray-500">資料載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://yqyjngpsgdewanppclep.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxeWpuZ3BzZ2Rld2FucHBjbGVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDIwODgsImV4cCI6MjA5ODg3ODA4OH0.CRigzLH0Qr8n-gpuJ_6v42BRM1SEXFPKX87GnPSM9BE';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 頁籤切換邏輯
    function switchTab(tabName) {
      const applyTab = document.getElementById('tab-apply');
      const historyTab = document.getElementById('tab-history');
      const applyBtn = document.getElementById('tab-apply-btn');
      const historyBtn = document.getElementById('tab-history-btn');

      if (tabName === 'apply') {
        applyTab.classList.remove('hidden');
        historyTab.classList.add('hidden');
        applyBtn.className = "flex-1 py-3 px-4 text-center font-medium text-blue-600 border-b-2 border-blue-600 focus:outline-none";
        historyBtn.className = "flex-1 py-3 px-4 text-center font-medium text-gray-500 hover:text-blue-600 focus:outline-none";
      } else {
        applyTab.classList.add('hidden');
        historyTab.classList.remove('hidden');
        historyBtn.className = "flex-1 py-3 px-4 text-center font-medium text-blue-600 border-b-2 border-blue-600 focus:outline-none";
        applyBtn.className = "flex-1 py-3 px-4 text-center font-medium text-gray-500 hover:text-blue-600 focus:outline-none";
        loadHistory();
      }
    }

    // 狀態渲染與顏色標籤
    function renderStatusBadge(status, reason) {
      const map = {
        'pending_audit': '<span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded">待會計審核</span>',
        'pending_payment': '<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">待出納撥款</span>',
        'paid': '<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded">已完成撥款</span>',
        'rejected': `<span class="bg-red-100 text-red-800 text-xs px-2 py-1 rounded" title="退單原因: ${reason || '無'}">已退單</span>`
      };
      return map[status] || `<span class="bg-gray-100 text-gray-800 text-xs px-2 py-1 rounded">${status}</span>`;
    }

    // 載入請款紀錄 (包覆 try...catch 防錯)
    async function loadHistory() {
      const tbody = document.getElementById('historyTableBody');
      try {
        const { data, error } = await supabaseClient
          .from('receipts')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-gray-500">目前尚無請款紀錄</td></tr>';
          return;
        }

        tbody.innerHTML = data.map(item => `
          <tr class="hover:bg-gray-50">
            <td class="px-4 py-3 whitespace-nowrap text-gray-500">${new Date(item.created_at).toLocaleDateString()}</td>
            <td class="px-4 py-3">${item.applicant_name}<br><span class="text-xs text-gray-400">收款: ${item.payee_name}</span></td>
            <td class="px-4 py-3 max-w-xs truncate">${item.description}</td>
            <td class="px-4 py-3 text-right font-medium text-gray-900">$${item.claim_amount}</td>
            <td class="px-4 py-3 text-center whitespace-nowrap">${renderStatusBadge(item.status, item.reject_reason)}</td>
          </tr>
        `).join('');

      } catch (err) {
        console.error('載入失敗：', err);
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-red-500">載入失敗：${err.message || '請確認 Schema 與網路連線'}</td></tr>`;
      }
    }

    // 表單送出處置
    async function handleFormSubmit(e) {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerText = '提交中...';

      const payload = {
        applicant_name: document.getElementById('applicant_name').value,
        payee_name: document.getElementById('payee_name').value,
        email: document.getElementById('email').value,
        purchase_date: document.getElementById('purchase_date').value,
        description: document.getElementById('description').value,
        invoice_amount: parseFloat(document.getElementById('invoice_amount').value),
        claim_amount: parseFloat(document.getElementById('claim_amount').value),
        receipt_type: document.getElementById('receipt_type').value,
        invoice_number: document.getElementById('invoice_number').value || '無',
        file_url: document.getElementById('file_url').value || null,
        status: 'pending_audit'
      };

      try {
        const { error } = await supabaseClient.from('receipts').insert([payload]);
        if (error) throw error;

        alert('請款申請送出成功！');
        document.getElementById('receiptForm').reset();
        switchTab('history');
      } catch (err) {
        alert(`送出失敗：${err.message}`);
        console.error('送出失敗：', err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = '送出請款申請';
      }
    }
  </script>
</body>
</html>
