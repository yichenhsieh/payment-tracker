<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>費用請款 - 申請單填寫</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#1e293b',
                            900: '#0f172a',
                            950: '#020617'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans flex flex-col justify-between">

    <!-- 頂部 Header -->
    <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600/20 p-2 rounded-lg border border-indigo-500/30">
                    <i class="fa-solid fa-file-invoice-dollar text-indigo-400 text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-wider">PAYMENT TRACKER</h1>
                    <p class="text-xs text-slate-400">線上費用請款申請</p>
                </div>
            </div>
            <a href="admin.html" class="text-xs text-slate-400 hover:text-indigo-400 transition flex items-center gap-1">
                <i class="fa-solid fa-user-shield"></i> 管理後台
            </a>
        </div>
    </header>

    <!-- 主要表單區塊 -->
    <main class="max-w-2xl mx-auto w-full px-4 py-8 flex-grow">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 sm:p-8 shadow-2xl">
            <div class="border-b border-slate-800 pb-4 mb-6">
                <h2 class="text-xl font-bold text-slate-100">填寫請款資料</h2>
                <p class="text-xs text-slate-400 mt-1">請確實填寫帶有 <span class="text-rose-500">*</span> 的必填欄位，並附上清晰的發票憑證。</p>
            </div>

            <form id="paymentForm" onsubmit="handleFormSubmit(event)" class="space-y-5">
                <!-- 申請人與通知 Email -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">申請人姓名 <span class="text-rose-500">*</span></label>
                        <input type="text" id="applicant_name" required placeholder="請輸入姓名" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">通知 Email <span class="text-rose-500">*</span></label>
                        <input type="email" id="email" required placeholder="example@domain.com" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition">
                    </div>
                </div>

                <!-- 收款人與請款金額 -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">收款人 / 戶名 <span class="text-rose-500">*</span></label>
                        <input type="text" id="payee_name" required placeholder="若同申請人請重複填寫" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">請款金額 (TWD) <span class="text-rose-500">*</span></label>
                        <input type="number" id="amount" min="1" required placeholder="0" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 font-mono transition">
                    </div>
                </div>

                <!-- 費用類別 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">費用類別 <span class="text-rose-500">*</span></label>
                    <select id="category" required class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition">
                        <option value="行政雜支">行政雜支</option>
                        <option value="差旅交通">差旅交通</option>
                        <option value="餐飲聚會">餐飲聚會</option>
                        <option value="設備耗材">設備耗材</option>
                        <option value="行銷推廣">行銷推廣</option>
                        <option value="其他費用">其他費用</option>
                    </select>
                </div>

                <!-- 請款用途說明 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">請款用途說明 <span class="text-rose-500">*</span></label>
                    <textarea id="purpose" rows="3" required placeholder="請詳細說明費用產生的原因與用途..." class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 transition"></textarea>
                </div>

                <!-- 上傳發票憑證 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-300 uppercase mb-1">發票 / 收據憑證圖檔 <span class="text-rose-500">*</span></label>
                    <input type="file" id="receipt_file" accept="image/*" required class="w-full bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-2 text-sm text-slate-400 file:mr-4 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer transition">
                    <p class="text-[11px] text-slate-500 mt-1">支援 JPG、PNG 格式，檔案大小請小於 5MB。</p>
                </div>

                <!-- 送出按鈕 -->
                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold tracking-wide transition shadow-lg flex items-center justify-center gap-2">
                        <i class="fa-solid fa-paper-plane"></i>
                        <span>提交請款申請</span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-slate-600">
        &copy; PAYMENT TRACKER SYSTEM
    </footer>

    <!-- JavaScript -->
    <script>
        const SUPABASE_URL = "https://yqyjngpsgdewanppclep.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxeWpuZ3BzZ2Rld2FucHBjbGVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDIwODgsImV4cCI6MjA5ODg3ODA4OH0.CRigzLH0Qr8n-gpuJ_6v42BRM1SEXFPKX87GnPSM9BE";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleFormSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 處理上傳中...`;

            try {
                const fileInput = document.getElementById('receipt_file');
                const file = fileInput.files[0];

                if (!file) {
                    throw new Error("請先選擇發票憑證圖檔！");
                }

                // 檔案大小限制 (5MB)
                if (file.size > 5 * 1024 * 1024) {
                    throw new Error("圖檔大小超過 5MB 限制，請先壓縮圖片！");
                }

                // 1. 上傳照片至 Supabase Storage (receipts bucket)
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 7)}.${fileExt}`;
                
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('receipts')
                    .upload(fileName, file);

                if (uploadError) throw new Error("圖檔上傳失敗: " + uploadError.message);

                // 取得圖檔公開 URL
                const { data: urlData } = supabaseClient.storage
                    .from('receipts')
                    .getPublicUrl(fileName);

                const publicUrl = urlData.publicUrl;

                // 2. 新增請款紀錄至 Supabase DB
                const payload = {
                    applicant_name: document.getElementById('applicant_name').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    payee_name: document.getElementById('payee_name').value.trim(),
                    amount: parseFloat(document.getElementById('amount').value),
                    category: document.getElementById('category').value,
                    purpose: document.getElementById('purpose').value.trim(),
                    receipt_url: publicUrl,
                    status: 'Pending'
                };

                const { error: insertError } = await supabaseClient
                    .from('receipts')
                    .insert([payload]);

                if (insertError) throw new Error("資料寫入失敗: " + insertError.message);

                // 3. 成功提示與重置表單
                await Swal.fire({
                    title: '請款單已送出！',
                    text: '您的請款申請已成功提交，待管理員審核。',
                    icon: 'success',
                    background: '#0f172a',
                    color: '#f8fafc',
                    confirmButtonColor: '#6366f1'
                });

                document.getElementById('paymentForm').reset();

            } catch (err) {
                Swal.fire({
                    title: '送出失敗',
                    text: err.message,
                    icon: 'error',
                    background: '#0f172a',
                    color: '#f8fafc',
                    confirmButtonColor: '#ef4444'
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fa-solid fa-paper-plane"></i> <span>提交請款申請</span>`;
            }
        }
    </script>
</body>
</html>
