<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>費用請款與查詢系統</title>
    <!-- 引入 Tailwind CSS 與 Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 強制加上手勢，確保在任何瀏覽器都一定點得下去 */
        .tab-btn {
            cursor: pointer !important;
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen text-slate-100 p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-2xl w-full">
        <!-- 頂部頁籤切換區 -->
        <div class="flex bg-slate-800 p-1.5 rounded-xl border border-slate-700 mb-6 shadow-xl relative z-10">
            <button id="tabFormBtn" onclick="switchTab('form')"
                class="tab-btn flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-center bg-indigo-600 text-white shadow-md">
                📝 新建請款單
            </button>
            <button id="tabSearchBtn" onclick="switchTab('search')"
                class="tab-btn flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-center text-slate-400 hover:text-slate-200">
                🔍 追蹤進度
            </button>
        </div>

        <!-- ================= 頁籤 1：請款表單區 ================= -->
        <div id="formSection"
            class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-6 md:p-8 transition-all duration-300">
            <div class="border-b border-slate-700 pb-4 mb-6">
                <h2 class="text-xl font-bold text-white tracking-wide">費用請款申請表</h2>
                <p class="text-xs text-slate-400 mt-1">請確實填寫報支欄位，並上傳清晰的發票或收據照片。</p>
            </div>

            <form id="reimbursementForm" onsubmit="handleSubmit(event)" class="space-y-5">
                <!-- 基本資訊組 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-2">申請人姓名 *</label>
                        <input type="text" id="applicant" required
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-2">實際受款人姓名 *</label>
                        <input type="text" id="payee_name" required
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-2">通知電子信箱 (查詢進度用) *</label>
                    <input type="email" id="email" required
                        class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500">
                </div>

                <!-- 發票資訊組 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-2">消費日期 *</label>
                        <input type="date" id="purchase_date" required
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-2">憑證種類 *</label>
                        <select id="receipt_type" required
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500">
                            <option value="二聯式發票">二聯式發票</option>
                            <option value="三聯式發票(統編)">三聯式發票(統編)</option>
                            <option value="收據/憑證">收據/憑證</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="md:col-span-1">
                        <label class="block text-xs font-semibold text-slate-400 mb-2">發票號碼</label>
                        <input type="text" id="invoice_no"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-2">發票總金額 *</label>
                        <input type="number" id="invoice_total" required step="0.01"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-white text-sm font-mono focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-2">本次實請金額 *</label>
                        <input type="number" id="reimbursement_total" required step="0.01"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-2.5 text-white text-sm font-mono focus:outline-none focus:border-indigo-500">
                    </div>
                </div>

                <!-- 實體發票上傳 -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-2">上傳發票實體相片/電子檔 *</label>
                    <input type="file" id="evidence_file" accept="image/*,application/pdf" required
                        class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 file:cursor-pointer cursor-pointer">
                </div>

                <!-- 動態品名明細清單 -->
                <div class="border-t border-slate-700/50 pt-4">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-xs font-semibold text-slate-400 uppercase">品名項目明細說明</label>
                        <button type="button" onclick="addItemRow()"
                            class="text-xs font-bold text-indigo-400 hover:text-indigo-300 flex items-center gap-1 cursor-pointer">➕
                            增加項目</button>
                    </div>
                    <div id="detailContainer" class="space-y-2">
                        <!-- 動態插入明細輸入框 -->
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.99] rounded-xl text-sm font-bold shadow-lg transition-all cursor-pointer mt-4">
                    🚀 提交請款申請
                </button>
            </form>
        </div>

        <!-- ================= 頁籤 2：進度查詢區 ================= -->
        <div id="searchSection"
            class="hidden bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 p-6 md:p-8 transition-all duration-300">
            <div class="border-b border-slate-700 pb-4 mb-6">
                <h2 class="text-xl font-bold text-white tracking-wide">🔍 請款進度即時查詢</h2>
                <p class="text-xs text-slate-400 mt-1">輸入請款單號或電子郵件，即時追蹤會計審核與出納撥款進度。</p>
            </div>

            <div class="flex gap-2">
                <input type="text" id="searchKey" placeholder="例如：REIM-20260713-1234 或 email@example.com"
                    class="flex-1 bg-slate-700/50 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-400 text-sm focus:outline-none focus:border-indigo-500 transition-all">
                <button onclick="performSearch()"
                    class="tab-btn px-5 py-3 bg-indigo-600 hover:bg-indigo-700 rounded-xl text-sm font-semibold shadow-md transition-all whitespace-nowrap">
                    搜尋
                </button>
            </div>

            <!-- 查詢結果渲染區 -->
            <div id="resultContainer" class="hidden mt-8 pt-6 border-t border-slate-700/50 transition-all"></div>
            <!-- 查詢提示訊息 -->
            <div id="infoMessage" class="hidden text-center mt-6 text-sm text-slate-400"></div>
        </div>
    </div>

    <script>
        // === 🚀 標準化複製金鑰設定區 ===
        const SUPABASE_URL = "https://yqyjngpsgdewanppclep.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxeWpuZ3BzZ2Rld2FucHBjbGVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDIwODgsImV4cCI6MjA5ODg3ODA4OH0.CRigzLH0Qr8n-gpuJ_6v42BRM1SEXFPKX87GnPSM9BE";
        const supabase = typeof Supabase !== 'undefined' ? Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        // 初始化：預設載入一行品名明細
        window.onload = function () {
            addItemRow();
        };

        // ================= 🛠️ 核心功能：頁籤切換 =================
        function switchTab(tab) {
            const formSection = document.getElementById('formSection');
            const searchSection = document.getElementById('searchSection');
            const tabFormBtn = document.getElementById('tabFormBtn');
            const tabSearchBtn = document.getElementById('tabSearchBtn');

            if (tab === 'form') {
                formSection.classList.remove('hidden');
                searchSection.classList.add('hidden');
                tabFormBtn.className = "tab-btn flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-center bg-indigo-600 text-white shadow-md";
                tabSearchBtn.className = "tab-btn flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-center text-slate-400 hover:text-slate-200";
            } else {
                formSection.classList.add('hidden');
                searchSection.classList.remove('hidden');
                tabFormBtn.className = "tab-btn flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-center text-slate-400 hover:text-slate-200";
                tabSearchBtn.className = "tab-btn flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-center bg-indigo-600 text-white shadow-md";
            }
        }

        // ================= 📝 請款表單邏輯組 =================
        function addItemRow() {
            const container = document.getElementById('detailContainer');
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center";
            div.innerHTML = `
                <input type="text" required placeholder="例如：7-11 寄件費、文具購買、計程車費..." 
                       class="item-description flex-1 bg-slate-700/40 border border-slate-600/70 rounded-xl px-3 py-2 text-white text-xs focus:outline-none focus:border-indigo-500">
                <button type="button" onclick="this.parentElement.remove()" class="tab-btn text-xs text-rose-400 hover:text-rose-300 px-1">✕</button>
            `;
            container.appendChild(div);
        }

        async function handleSubmit(event) {
            event.preventDefault();
            if (!supabase) return alert('請先填入 Supabase 金鑰設定！');

            // 抓取主檔欄位
            const applicant = document.getElementById('applicant').value;
            const payeeName = document.getElementById('payee_name').value;
            const email = document.getElementById('email').value;
            const purchaseDate = document.getElementById('purchase_date').value;
            const receiptType = document.getElementById('receipt_type').value;
            const invoiceNo = document.getElementById('invoice_no').value;
            const invoiceTotal = parseFloat(document.getElementById('invoice_total').value);
            const reimbursementTotal = parseFloat(document.getElementById('reimbursement_total').value);

            // 生成唯一單號
            const todayStr = new Date().toISOString().slice(0, 10).replace(/-/g, "");
            const formNo = `REIM-${todayStr}-${Math.floor(1000 + Math.random() * 9000)}`;

            // 實體發票上傳 Storage
            const fileInput = document.getElementById('evidence_file');
            let finalFileUrl = "";

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const fileName = `${formNo}.${fileExt}`;

                const { error: uploadError } = await supabase.storage.from('receipts').upload(fileName, file, { cacheControl: '3600', upsert: false });
                if (uploadError) return alert('發票相片上傳失敗：' + uploadError.message);

                const { data: urlData } = supabase.storage.from('receipts').getPublicUrl(fileName);
                finalFileUrl = urlData.publicUrl;
            } else {
                return alert('請上傳發票憑證！');
            }

            // A. 寫入主檔
            const { data: masterData, error: masterError } = await supabase.from('reimbursement_masters').insert([{
                form_no: formNo, applicant, payee_name: payeeName, email, purchase_date: purchaseDate,
                receipt_type: receiptType, invoice_no: invoiceNo, invoice_total: invoiceTotal,
                reimbursement_total: reimbursementTotal, file_url: finalFileUrl
            }]).select();

            if (masterError) return alert('提交失敗：' + masterError.message);

            // B. 批次寫入明細
            const detailRows = document.querySelectorAll('.item-description');
            const detailsToInsert = Array.from(detailRows).map(input => ({ master_id: masterData[0].id, item_description: input.value }));

            const { error: detailError } = await supabase.from('reimbursement_details').insert(detailsToInsert);

            if (detailError) {
                alert('明細存入失敗：' + detailError.message);
            } else {
                alert(`🎉 提交成功！\n您的查詢單號為：${formNo}`);
                document.getElementById('reimbursementForm').reset();
                document.getElementById('detailContainer').innerHTML = '';
                addItemRow();

                // 自動帶入單號並切換到查詢頁籤，方便員工確認
                document.getElementById('searchKey').value = formNo;
                switchTab('search');
                performSearch();
            }
        }

        // ================= 🔍 進度查詢邏輯組 =================
        async function performSearch() {
            const searchKey = document.getElementById('searchKey').value.trim();
            const resultContainer = document.getElementById('resultContainer');
            const infoMessage = document.getElementById('infoMessage');

            if (!supabase) return alert('請先填入 Supabase 金鑰！');
            if (!searchKey) return alert('請輸入查詢關鍵字！');

            resultContainer.classList.add('hidden');
            infoMessage.classList.remove('hidden');
            infoMessage.innerText = '雲端檢索中...';

            let query = supabase.from('reimbursement_masters').select('*');
            if (searchKey.includes('@')) {
                query = query.eq('email', searchKey).order('id', { ascending: false });
            } else {
                query = query.eq('form_no', searchKey);
            }

            const { data, error } = await query;
            if (error) return infoMessage.innerText = '查詢失敗：' + error.message;
            if (!data || data.length === 0) return infoMessage.innerText = '找不到相符的請款單據。';

            infoMessage.classList.add('hidden');
            resultContainer.classList.remove('hidden');
            renderResult(data[0]);
        }

        function renderResult(order) {
            const container = document.getElementById('resultContainer');
            const step1Class = "bg-indigo-500 text-white";
            let step2Class = "bg-slate-700 text-slate-400";
            let step3Class = "bg-slate-700 text-slate-400";
            let currentStatusDesc = "單據已送出，等待會計抽單審核。";

            if (order.accounting_review === "審核通過") {
                step2Class = "bg-indigo-500 text-white";
                currentStatusDesc = "會計已審核通過！單據正移交出納安排發款。";
            } else if (order.accounting_review === "退回修正") {
                step2Class = "bg-rose-500 text-white";
                currentStatusDesc = "🚨 單據已被會計退回，請聯繫財會確認。";
            }

            if (order.status === "已發款" || order.payout_confirmed === true) {
                step2Class = "bg-indigo-500 text-white";
                step3Class = "bg-emerald-500 text-white";
                currentStatusDesc = "🎉 出納已完成撥款！請確認您的指定帳戶。";
            }

            container.innerHTML = `
                <!-- 視覺化進度條 -->
                <div class="mb-8 relative flex items-center justify-between">
                    <div class="absolute left-0 right-0 top-1/2 -translate-y-1/2 h-1 bg-slate-700 -z-10"></div>
                    <div class="flex flex-col items-center"><div class="w-7 h-7 rounded-full ${step1Class} flex items-center justify-center text-xs font-bold">1</div><span class="text-[10px] text-slate-400 mt-1">已提交</span></div>
                    <div class="flex flex-col items-center"><div class="w-7 h-7 rounded-full ${step2Class} flex items-center justify-center text-xs font-bold">2</div><span class="text-[10px] text-slate-400 mt-1">會計審核</span></div>
                    <div class="flex flex-col items-center"><div class="w-7 h-7 rounded-full ${step3Class} flex items-center justify-center text-xs font-bold">3</div><span class="text-[10px] text-slate-400 mt-1">出納發款</span></div>
                </div>
                <!-- 摘要卡片 -->
                <div class="bg-slate-700/30 border border-slate-600/50 rounded-xl p-4 space-y-2 text-xs">
                    <div class="flex justify-between border-b border-slate-700 pb-2"><span class="text-slate-400">單號：<span class="font-mono text-indigo-400 font-bold">${order.form_no}</span></span><span class="px-1.5 py-0.5 rounded bg-slate-700 font-bold">${order.status}</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">實請金額</span><span class="font-bold text-white font-mono">NT$ ${parseFloat(order.reimbursement_total).toLocaleString()}</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">會計審核</span><span class="font-semibold ${order.accounting_review === '審核通過' ? 'text-emerald-400' : order.accounting_review === '退回修正' ? 'text-rose-400' : 'text-amber-400'}">${order.accounting_review}</span></div>
                </div>
                <div class="mt-3 text-center text-xs text-indigo-300 bg-indigo-950/20 border border-indigo-900/40 rounded-lg py-2 px-3">💡 ${currentStatusDesc}</div>
            `;
        }
    </script>
</body>

</html>
